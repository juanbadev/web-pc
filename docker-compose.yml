version: '3.9'

services:

  # ── Aplicación principal ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: linuxcloud_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-cambiar-en-produccion-secreto-largo}
      - DEBUG=false
      - PORT=5000
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  # Para controlar Docker desde Flask
      - linuxcloud_db:/app/data
    networks:
      - linuxcloud_net
    depends_on:
      - nginx

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: linuxcloud_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # Descomentar para HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      # - ./certs:/etc/nginx/certs:ro  # Para HTTPS
    networks:
      - linuxcloud_net

networks:
  linuxcloud_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  linuxcloud_db:
