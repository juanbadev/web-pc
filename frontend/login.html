<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — LinuxCloud</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-auth">
  <div class="bg-grid"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <a href="/" class="auth-logo">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">LinuxCloud</span>
      </a>

      <h2 class="auth-title">Bienvenido de vuelta</h2>
      <p class="auth-sub">Accede a tu entorno Linux personal.</p>

      <div id="alert" class="alert hidden"></div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="tu_usuario" required/>
          <span class="field-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-eye">
            <input type="password" id="password" name="password" autocomplete="current-password"
                   placeholder="••••••••" required/>
            <button type="button" class="eye-toggle" id="togglePwd" aria-label="Mostrar contraseña">👁</button>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>

      <p class="auth-switch">
        ¿No tienes cuenta? <a href="/register.html">Crear cuenta</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');

    // Toggle password visibility
    togglePwd.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      togglePwd.textContent = isText ? '👁' : '🙈';
    });

    // Redirect if already logged in
    if (api.getToken()) {
      window.location.href = '/dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('username').value.trim();
      const password = pwdInput.value;

      let valid = true;
      if (!username) { showFieldError('username', 'Ingresa tu usuario.'); valid = false; }
      if (!password) { showFieldError('password', 'Ingresa tu contraseña.'); valid = false; }
      if (!valid) return;

      setLoading(true);

      try {
        const data = await api.post('/api/login', { username, password });
        api.setToken(data.token);
        api.setUser(data.user);
        showAlert('✓ Sesión iniciada. Redirigiendo…', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 600);
      } catch (err) {
        showAlert(err.message || 'Error al iniciar sesión.', 'error');
        setLoading(false);
      }
    });

    function setLoading(on) {
      submitBtn.querySelector('.btn-text').classList.toggle('hidden', on);
      submitBtn.querySelector('.btn-spinner').classList.toggle('hidden', !on);
      submitBtn.disabled = on;
    }

    function showAlert(msg, type) {
      alert.textContent = msg;
      alert.className = `alert alert-${type}`;
    }

    function showFieldError(field, msg) {
      document.getElementById(`err-${field}`).textContent = msg;
    }

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
      alert.className = 'alert hidden';
    }
  </script>
</body>
</html>
