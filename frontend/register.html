<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear cuenta — LinuxCloud</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-auth">
  <div class="bg-grid"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">LinuxCloud</span>
      </a>

      <h2 class="auth-title">Crea tu entorno</h2>
      <p class="auth-sub">Tu propio Linux privado en segundos.</p>

      <div id="alert" class="alert hidden"></div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="username">Nombre de usuario</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="mi_usuario" required minlength="3" maxlength="20"/>
          <span class="field-hint">3-20 caracteres, letras, números y guión bajo.</span>
          <span class="field-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email"
                 placeholder="correo@ejemplo.com" required/>
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-eye">
            <input type="password" id="password" name="password" autocomplete="new-password"
                   placeholder="Mínimo 8 caracteres" required minlength="8"/>
            <button type="button" class="eye-toggle" id="togglePwd" aria-label="Ver contraseña">👁</button>
          </div>
          <div class="pwd-strength" id="pwdStrength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span id="strengthLabel"></span>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>

        <div class="form-group">
          <label for="confirm">Confirmar contraseña</label>
          <input type="password" id="confirm" name="confirm" autocomplete="new-password"
                 placeholder="Repite la contraseña" required/>
          <span class="field-error" id="err-confirm"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span class="btn-text">Crear cuenta</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>

      <p class="auth-switch">
        ¿Ya tienes cuenta? <a href="/login.html">Iniciar sesión</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (api.getToken()) window.location.href = '/dashboard.html';

    const form       = document.getElementById('registerForm');
    const alertEl    = document.getElementById('alert');
    const submitBtn  = document.getElementById('submitBtn');
    const pwdInput   = document.getElementById('password');
    const togglePwd  = document.getElementById('togglePwd');
    const fillEl     = document.getElementById('strengthFill');
    const labelEl    = document.getElementById('strengthLabel');

    togglePwd.addEventListener('click', () => {
      const t = pwdInput.type === 'text';
      pwdInput.type = t ? 'password' : 'text';
      togglePwd.textContent = t ? '👁' : '🙈';
    });

    pwdInput.addEventListener('input', () => {
      const v = pwdInput.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^a-zA-Z0-9]/.test(v)) score++;
      const labels = ['', 'Débil', 'Regular', 'Buena', 'Fuerte'];
      const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
      fillEl.style.width = (score * 25) + '%';
      fillEl.style.background = colors[score] || 'transparent';
      labelEl.textContent = labels[score] || '';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = pwdInput.value;
      const confirm  = document.getElementById('confirm').value;

      let valid = true;
      if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
        showFieldError('username', 'Solo letras, números y _, entre 3 y 20 caracteres.'); valid = false;
      }
      if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        showFieldError('email', 'Email inválido.'); valid = false;
      }
      if (password.length < 8) {
        showFieldError('password', 'Mínimo 8 caracteres.'); valid = false;
      }
      if (password !== confirm) {
        showFieldError('confirm', 'Las contraseñas no coinciden.'); valid = false;
      }
      if (!valid) return;

      setLoading(true);
      try {
        const data = await api.post('/api/register', { username, email, password });
        api.setToken(data.token);
        api.setUser(data.user);
        showAlert('✓ Cuenta creada. Redirigiendo…', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 700);
      } catch (err) {
        showAlert(err.message || 'Error al crear la cuenta.', 'error');
        setLoading(false);
      }
    });

    function setLoading(on) {
      submitBtn.querySelector('.btn-text').classList.toggle('hidden', on);
      submitBtn.querySelector('.btn-spinner').classList.toggle('hidden', !on);
      submitBtn.disabled = on;
    }
    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${type}`;
    }
    function showFieldError(field, msg) {
      document.getElementById(`err-${field}`).textContent = msg;
    }
    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
      alertEl.className = 'alert hidden';
    }
  </script>
</body>
</html>
