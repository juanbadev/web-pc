events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Seguridad básica ────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Rate limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstream Flask ──────────────────────────────────────
    upstream flask_app {
        server app:5000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;     # Cambiar por tu dominio en producción

        # Tamaño máximo de request
        client_max_body_size 1m;

        # ── Archivos estáticos ──────────────────────────────
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ @backend;
        }

        location ~* \.(css|js|png|jpg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── API → Flask ─────────────────────────────────────
        location @backend {
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/(login|register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── WebSocket para ttyd (terminal) ──────────────────
        # Los contenedores ttyd se exponen directamente en puertos 7700-7800
        # El navegador conecta directamente a http://SERVER_IP:PORT
        # Si quieres proxiar por nginx, descomentar y adaptar:
        #
        # location ~ ^/terminal/(\d+)/ {
        #     proxy_pass http://127.0.0.1:$1/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade    $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host       $host;
        #     proxy_read_timeout 3600s;
        # }
    }

    # ── HTTPS (descomentar cuando tengas certificado SSL) ───
    # server {
    #     listen 443 ssl http2;
    #     server_name tudominio.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... mismo config que arriba
    # }
}
